# Firecrawl self-hosted stack
#
# This compose file is a thin wrapper that points to the upstream
# Firecrawl repo build. To use:
#
#   1. Clone firecrawl: git clone https://github.com/firecrawl/firecrawl.git ~/firecrawl-src
#   2. cd ~/firecrawl-src && cp .env.example .env
#   3. docker compose build
#   4. docker compose up -d
#
# Or use `lookout infra up` which does the same from ~/firecrawl-src.
#
# The pre-built ghcr.io images require Docker-in-Docker and don't work
# standalone. Building from source is the supported self-hosting method.
