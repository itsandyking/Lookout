# SearXNG — self-hosted metasearch engine
# Used as fallback search provider in the enrichment resolver.
#
# Start: docker compose up -d
# Test:  curl 'http://localhost:8080/search?q=test&format=json' | python3 -m json.tool
#
# JSON API must be enabled in settings.yml (done automatically on first run
# via SEARXNG_SETTINGS_OVERRIDE).

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/etc/searxng
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
