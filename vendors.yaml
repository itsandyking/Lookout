      description: ".product-description, .pdp-description"
      features: ".product-features ul, .feature-list"
      specs: ".product-specs table, .specs-table"
      images: ".product-gallery img, .pdp-gallery img, [data-testid='product-image']"
    product_url_patterns:
      - "/shop/"
      - "/products/"
    search:
      method: "site_search"
      query_template: "site:{domain} {query}"

