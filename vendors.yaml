# Vendor Configuration for Merchfill Pipeline
# Each vendor entry defines how to discover and scrape product pages

vendors:
  Patagonia:
    domain: "patagonia.com"
    # Paths that should be excluded from product matching
    blocked_paths:
      - "/blog"
      - "/support"
      - "/worn-wear"
      - "/activism"
      - "/stories"
      - "/about"
      - "/help"
      - "/account"
      - "/cart"
      - "/search"
    # URL patterns that indicate a product page
    product_url_patterns:
      - "/product/"
      - "/p/"
    # Search configuration
    search:
      method: "site_search"  # or "internal_api"
      query_template: "site:{domain} {query}"

  Altra:
    domain: "altrarunning.com"
    fallback_domains:
