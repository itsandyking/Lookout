# Vendor Configuration for Merchfill Pipeline
# Each vendor entry defines how to discover and scrape product pages
#
# b2b_platform: elastic_suite | nuorder | envoy_b2b | hubsoft | deckers_b2b | custom
# b2b_url: Login URL for the vendor's B2B/wholesale portal

vendors:
  Patagonia:
    domain: "patagonia.com"
    blocked: true  # Akamai bot protection
    b2b_platform: elastic_suite
    b2b_url: "https://b2bsales.patagonia.com/#splash"
    # Paths that should be excluded from product matching
    blocked_paths:
      - "/blog"
      - "/support"
      - "/worn-wear"
      - "/activism"
      - "/stories"
      - "/about"
      - "/help"
      - "/account"
      - "/cart"
      - "/search"
    # URL patterns that indicate a product page
    product_url_patterns:
      - "/product/"
      - "/p/"
    # Search configuration
    search:
      method: "site_search"  # or "internal_api"
      query_template: "site:{domain} {query}"

  Altra:
    domain: "altrarunning.com"
    blocked: true  # Bot protection
    b2b_platform: custom
    b2b_url: "https://b2b.altrarunning.com/#splash"
    fallback_domains:
      - "zappos.com"
    blocked_paths:
      - "/blog"
      - "/stories"
      - "/about"
      - "/help"
      - "/account"
      - "/cart"
      - "/support"
      - "/ambassadors"
    product_url_patterns:
      - "/shop/"
      - "/products/"
    search:
      method: "site_search"
      query_template: "site:{domain} {query}"

  Rossignol:
    domain: "rossignol.com"
    swatch_selector: "button.color-toggle.js-color-toggle"
