# Vendor Configuration for Merchfill Pipeline
# Each vendor entry defines how to discover and scrape product pages

vendors:
  Patagonia:
    domain: "patagonia.com"
    use_playwright: true
    playwright_config:
      wait_for_selector: "h1, .product-hero__title, [data-testid='product-title']"
      wait_timeout_ms: 15000
      extra_wait_ms: 3000
    # Paths that should be excluded from product matching
    blocked_paths:
      - "/blog"
      - "/support"
      - "/worn-wear"
      - "/activism"
      - "/stories"
      - "/about"
      - "/help"
      - "/account"
      - "/cart"
      - "/search"
    # Optional: CSS selectors for content extraction
    selectors:
      product_name: "h1.product-hero__title, h1[data-testid='product-title']"
      description: ".product-hero__description, .pdp-details__description"
      features: ".pdp-features__list, .product-features ul"
      specs: ".pdp-specs table, .product-specs dl"
      images: ".product-hero__gallery img, .pdp-gallery img"
      price: ".product-hero__price, .price--sale"
    # URL patterns that indicate a product page
    product_url_patterns:
      - "/product/"
      - "/p/"
    # Search configuration
    search:
      method: "site_search"  # or "internal_api"
      query_template: "site:{domain} {query}"

  Altra:
    domain: "altrarunning.com"
    use_playwright: true
    playwright_config:
      wait_for_selector: "#productTitle, .l-pdp"
      wait_timeout_ms: 15000
      extra_wait_ms: 2000
    blocked_paths:
