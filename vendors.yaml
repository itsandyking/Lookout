# Global settings
settings:
  # Default confidence thresholds for URL matching
  confidence:
    auto_proceed: 85
    warn_threshold: 70
    reject_threshold: 70

  # Rate limiting (per domain)
  rate_limiting:
    min_delay_ms: 500
    max_delay_ms: 2000
    max_concurrent_per_domain: 2

  # Retry configuration
  retries:
    max_attempts: 3
    backoff_base_ms: 1000
    backoff_max_ms: 30000

  # Timeout settings
  timeouts:
    request_timeout_ms: 30000
    page_load_timeout_ms: 60000

  brave_images:
    enabled: true
    ollama_host: "http://localhost:11434"
    ollama_model: "gemma4:e4b"
    max_candidates_per_color: 3
    min_image_dimensions: 400
    verify_timeout: 30
    brave_count: 50
    max_evaluate: 15
