<tr class="run-row"
    {% if run.status.value in ['QUEUED', 'RUNNING'] %}
    hx-get="/runs/{{ run.run_id }}/run-row"
    hx-trigger="every 3s"
    hx-swap="outerHTML"
    {% endif %}>
    <td>
        <a href="/runs/{{ run.run_id }}" class="run-link">
            {{ run.run_id }}
        </a>
    </td>
    <td>{{ run.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
    <td>
        <span class="status-badge status-{{ run.status.value.lower() }}">
            {{ run.status.value }}
        </span>
    </td>
    <td>
        {% if run.total > 0 %}
        {{ run.completed }}/{{ run.total }}
        {% else %}
        -
        {% endif %}
    </td>
    <td class="stat-success">{{ run.updated }}</td>
    <td class="stat-error">{{ run.failed }}</td>
</tr>
