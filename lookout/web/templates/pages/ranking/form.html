{% extends "base.html" %}
{% block title %}Merchandiser{% endblock %}
{% block page_title %}Merchandiser{% endblock %}
{% block page_subtitle %}<p class="text-sm text-gray-500 mt-1">Rank products by sales velocity, margin, and inventory health for optimal merchandising</p>{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <form action="/merchandise/results" method="get">
        <div class="card p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Collection</label>
                    <select name="collection" class="w-full rounded-lg border-gray-300 shadow-sm text-sm p-2.5 border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        <option value="">All products</option>
                        {% for c in collections %}
                        <option value="{{ c.handle }}">{{ c.title }} ({{ c.product_count }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Vendor</label>
                    <select name="vendor" class="w-full rounded-lg border-gray-300 shadow-sm text-sm p-2.5 border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        <option value="">All vendors</option>
                        {% for v in vendors %}
                        <option value="{{ v }}">{{ v }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Type</label>
                    <select name="product_type" class="w-full rounded-lg border-gray-300 shadow-sm text-sm p-2.5 border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                        <option value="">All types</option>
                        {% for pt in product_types %}
                        <option value="{{ pt }}">{{ pt }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Max Products</label>
                    <input type="number" name="limit" value="50" min="10" max="200"
                           class="w-full rounded-lg border-gray-300 shadow-sm text-sm p-2.5 border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
                </div>
            </div>
        </div>
        <button type="submit" class="btn-primary mt-6">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
            </svg>
            Generate Rankings
        </button>
    </form>
</div>
{% endblock %}
