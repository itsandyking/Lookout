{% extends "base.html" %}
{% block title %}Rankings{% endblock %}
{% block page_title %}Rankings — {{ result.collection_name }}{% endblock %}

{% block content %}
<div class="flex gap-3 mb-6">
    <a href="/merchandise/{{ result_id }}/download" class="btn-primary" hx-boost="false">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
        </svg>
        Download CSV
    </a>
    <a href="/merchandise/" class="btn-secondary">New Ranking</a>
</div>

<div id="rankings-table">
    {% include "pages/merchandiser/_rankings_table.html" %}
</div>
{% endblock %}
