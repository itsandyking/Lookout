name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: itsandyking/The-Variant-Range
          path: ../The-Variant-Range

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev --extra enrich --extra web

      - name: Lint
        run: uv run ruff check lookout/

      - name: Format check
        run: uv run ruff format --check lookout/

      - name: Type check
        run: uv run ty check --exit-zero

      - name: Test
        run: uv run pytest tests/ -q -x
